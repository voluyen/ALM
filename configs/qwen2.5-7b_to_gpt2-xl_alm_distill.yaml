# Pair 2 (ALM-only): VoCuc/Qwen2.5-7B-Instruct-Dolly-SFT -> openai-community/gpt2-xl
# LoRA (r=256, alpha=8, dropout=0.1 hardcoded in code), 15 epochs, batch 8.
# LR 1e-3, projector LR 1e-3 (lr_scale=1).
# Losses: sft + alm_unconstrained (no MTA).

name: "qwen2.5-7b_to_gpt2-xl_alm"
output: "outputs/qwen2.5-7b_to_gpt2-xl_alm"

epochs: 15
steps: 0
warmup_steps: 0

num_workers: 8
log_interval: 50
sync_interval: 100
eval_interval: 50000
save_interval: 50000

losses: [sft, alm_unconstrained]
loss_weights: [1.0, 1.0]

target_tokenizer_name: openai-community/gpt2-xl:source=GPT2
tokens_to_add: []

train_model_mode: "lora"
train_embeddings: true

binarization_temp: 100.0
alm_diff_fn: "binary_ce"
alm_mode: "merge_by_space_prob+append_space"
tokenizer_pair_data_path: "artifacts/tokenizer_data/qwen2.5_to_gpt2-xl"
tokenizer_pair_bias_threshold: 0.1

student_device: "cuda:0"
teacher_device: "cuda:0"

student:
  pretrained_model_name_or_path: "openai-community/gpt2-xl"
  tokenizer_name: "openai-community/gpt2-xl:source=GPT2"

teacher:
  pretrained_model_name_or_path: "VoCuc/Qwen2.5-7B-Instruct-Dolly-SFT"
  tokenizer_name: "VoCuc/Qwen2.5-7B-Instruct-Dolly-SFT:source=Qwen2"

data:
  path: data/dolly_train.jsonl
  batch_size: 8
  num_workers: 8
  kind: "jsonl"
  lang_code: en

hypernet:
  architecture: transformer
  num_layers: 1
  residual: true
  residual_alpha: 1
  use_attention: false

optimizer:
  type: adamw
  weight_decay: 0.01
  b1: 0.9
  b2: 0.95
  eps: 1.e-8
  grad_acc_steps: null
  learning_rate: 1.e-3
  max_grad_norm: 1.0
  param_groups:
    # PROJECTOR_LR == LR -> lr_scale=1.
    - pattern: .*(projector_query|projector_s2t|projector_t2s|projector_latents|loss_weights).*
      lr_scale: 1

eval:
  tasks: [arc_easy,arc_challenge,piqa,hellaswag,boolq,arithmetic,mmlu]
  lengths: [128, 256, 512, 1024, 2048]
  tokens_per_batch: 8192
  add_bos: true
  chat_template_mode: surround_instruct
  confirm_run_unsafe_code: true
