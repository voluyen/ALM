# Pair 3: VoCuc/Qwen2.5-7B-Instruct-Dolly-SFT -> facebook/opt-2.7b
# LoRA, 15 epochs, batch 8, LR 1e-3, projector LR 1e-3 (lr_scale=1).
# Requires OPTModelKind added to tokenkit/model_kinds.py.

name: "qwen2.5-7b_to_opt-2.7b"
output: "outputs/qwen2.5-7b_to_opt-2.7b"

epochs: 15
steps: 0
warmup_steps: 0

num_workers: 8
log_interval: 50
sync_interval: 100
eval_interval: 50000
save_interval: 50000

losses: [sft, alm_unconstrained, mta]
loss_weights: [1.0, 1.0, 2.0]

target_tokenizer_name: facebook/opt-2.7b:source=OPT
tokens_to_add: []

train_model_mode: "lora"
train_embeddings: true

binarization_temp: 100.0
alm_diff_fn: "binary_ce"
alm_mode: "merge_by_space_prob+append_space"
tokenizer_pair_data_path: "artifacts/tokenizer_data/qwen2.5_to_opt-2.7b"
tokenizer_pair_bias_threshold: 0.1

student_device: "cuda:0"
teacher_device: "cuda:0"

mta_mode: true
teacher_layer_mapping: [8, 12, 16, 20, 24, 28]
student_layer_mapping: [7, 12, 17, 22, 27, 32]
split_layer_mapping: [0, 1, 6, 6]
entropy_weight: false
wo_span_weight: false

student:
  pretrained_model_name_or_path: "facebook/opt-2.7b"
  tokenizer_name: "facebook/opt-2.7b:source=OPT"

teacher:
  pretrained_model_name_or_path: "VoCuc/Qwen2.5-7B-Instruct-Dolly-SFT"
  tokenizer_name: "VoCuc/Qwen2.5-7B-Instruct-Dolly-SFT:source=Qwen2"

data:
  path: data/dolly_train_with_spans.jsonl
  batch_size: 8
  num_workers: 8
  kind: "jsonl"
  lang_code: en

hypernet:
  architecture: transformer
  num_layers: 1
  residual: true
  residual_alpha: 1
  use_attention: false

optimizer:
  type: adamw
  weight_decay: 0.01
  b1: 0.9
  b2: 0.95
  eps: 1.e-8
  grad_acc_steps: null
  learning_rate: 1.e-3
  max_grad_norm: 1.0
  param_groups:
    - pattern: .*(projector_query|projector_s2t|projector_t2s|projector_latents|loss_weights|mta_projector).*
      lr_scale: 1

eval:
  tasks: [arc_easy,arc_challenge,piqa,hellaswag,boolq,arithmetic,mmlu]
  lengths: [128, 256, 512, 1024, 2048]
  tokens_per_batch: 8192
  add_bos: true
  chat_template_mode: surround_instruct
  confirm_run_unsafe_code: true
