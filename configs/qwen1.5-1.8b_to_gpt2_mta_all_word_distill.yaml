# Pair 0 ablation (MTA all-word): VoCuc/Qwen1.5_1.8B_SFT -> openai-community/gpt2 (124M).
# Full fine-tune, 20 epochs, batch 16. split_layer_mapping [0,3,3,3]:
# all 3 projectors are word-level, span-level disabled.

name: "qwen1.5-1.8b_to_gpt2_mta_all_word"
output: "outputs/qwen1.5-1.8b_to_gpt2_mta_all_word"

epochs: 20
steps: 0
warmup_steps: 0

num_workers: 8
log_interval: 50
sync_interval: 100
eval_interval: 50000
save_interval: 50000

losses: [sft, alm_unconstrained, mta]
loss_weights: [1.0, 1.0, 2.0]

target_tokenizer_name: openai-community/gpt2:source=GPT2
tokens_to_add: []

train_model_mode: "full"
train_embeddings: true

binarization_temp: 100.0
alm_diff_fn: "binary_ce"
alm_mode: "merge_by_space_prob+append_space"
tokenizer_pair_data_path: "artifacts/tokenizer_data/qwen_to_gpt2"
tokenizer_pair_bias_threshold: 0.1

student_device: "cuda:0"
teacher_device: "cuda:0"

mta_mode: true
teacher_layer_mapping: [12, 18, 24]
student_layer_mapping: [6, 9, 12]
# All 3 projectors word-level, 0 span-level.
split_layer_mapping: [0, 3, 3, 3]
entropy_weight: false
wo_span_weight: false

student:
  pretrained_model_name_or_path: "openai-community/gpt2"
  tokenizer_name: "openai-community/gpt2:source=GPT2"

teacher:
  pretrained_model_name_or_path: "VoCuc/Qwen1.5_1.8B_SFT"
  tokenizer_name: "VoCuc/Qwen1.5_1.8B_SFT:source=Qwen2"

data:
  path: data/dolly_train_with_spans.jsonl
  batch_size: 8
  num_workers: 16
  kind: "jsonl"
  lang_code: en

hypernet:
  architecture: transformer
  num_layers: 1
  residual: true
  residual_alpha: 1
  use_attention: false

optimizer:
  type: adamw
  weight_decay: 0.01
  b1: 0.9
  b2: 0.95
  eps: 1.e-8
  grad_acc_steps: null
  learning_rate: 5.e-4
  max_grad_norm: 1.0
  param_groups:
    - pattern: .*(projector_query|projector_s2t|projector_t2s|projector_latents|loss_weights).*
      lr_scale: 2

eval:
  tasks: [arc_easy,arc_challenge,piqa,hellaswag,boolq,arithmetic,mmlu]
  lengths: [128, 256, 512, 1024, 2048]
  tokens_per_batch: 8192
  add_bos: true
  chat_template_mode: surround_instruct
  confirm_run_unsafe_code: true
